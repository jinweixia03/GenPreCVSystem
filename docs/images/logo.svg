<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#41CD52;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2da03d;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" stroke="#2d3a5c" stroke-width="4"/>

  <!-- 外圈装饰 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>

  <!-- 像素网格背景 -->
  <g opacity="0.15">
    <line x1="96" y1="176" x2="416" y2="176" stroke="#00d4ff" stroke-width="1"/>
    <line x1="96" y1="256" x2="416" y2="256" stroke="#00d4ff" stroke-width="1"/>
    <line x1="96" y1="336" x2="416" y2="336" stroke="#00d4ff" stroke-width="1"/>
    <line x1="176" y1="96" x2="176" y2="416" stroke="#00d4ff" stroke-width="1"/>
    <line x1="256" y1="96" x2="256" y2="416" stroke="#00d4ff" stroke-width="1"/>
    <line x1="336" y1="96" x2="336" y2="416" stroke="#00d4ff" stroke-width="1"/>
  </g>

  <!-- 眼睛轮廓 - 象征计算机视觉 -->
  <path d="M 126 256 Q 256 136 386 256 Q 256 376 126 256 Z"
        fill="none" stroke="url(#eyeGradient)" stroke-width="6" filter="url(#glow)"/>

  <!-- 眼睛内部 - 瞳孔 -->
  <ellipse cx="256" cy="256" rx="45" ry="45" fill="#0a1628" stroke="#00d4ff" stroke-width="3"/>

  <!-- 瞳孔高光 -->
  <circle cx="270" cy="242" r="12" fill="#00d4ff" opacity="0.6"/>
  <circle cx="274" cy="238" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- 扫描线动画效果（静态表示） -->
  <line x1="126" y1="256" x2="386" y2="256" stroke="#41CD52" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="136" x2="256" y2="376" stroke="#41CD52" stroke-width="1" opacity="0.4"/>

  <!-- 角点检测标记 - 象征 CV 特征点 -->
  <g fill="#41CD52">
    <!-- 左上 -->
    <rect x="146" y="196" width="8" height="8" rx="1"/>
    <!-- 右上 -->
    <rect x="358" y="196" width="8" height="8" rx="1"/>
    <!-- 左下 -->
    <rect x="146" y="308" width="8" height="8" rx="1"/>
    <!-- 右下 -->
    <rect x="358" y="308" width="8" height="8" rx="1"/>
  </g>

  <!-- 边框检测线 -->
  <path d="M 146 196 L 358 196 L 358 308 L 146 308 Z"
        fill="none" stroke="#41CD52" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>

  <!-- 神经网络节点装饰 -->
  <g fill="#00d4ff" opacity="0.7">
    <circle cx="176" cy="226" r="4"/>
    <circle cx="196" cy="236" r="4"/>
    <circle cx="186" cy="256" r="4"/>
    <line x1="176" y1="226" x2="196" y2="236" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="196" y1="236" x2="186" y2="256" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>

  <g fill="#00d4ff" opacity="0.7">
    <circle cx="336" cy="226" r="4"/>
    <circle cx="316" cy="236" r="4"/>
    <circle cx="326" cy="256" r="4"/>
    <line x1="336" y1="226" x2="316" y2="236" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="316" y1="236" x2="326" y2="256" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 底部文字标识 -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="24"
        font-weight="bold" fill="#00d4ff" opacity="0.9">GPCV</text>

  <!-- 装饰性小点 -->
  <circle cx="96" cy="256" r="3" fill="#41CD52" opacity="0.6"/>
  <circle cx="416" cy="256" r="3" fill="#41CD52" opacity="0.6"/>
</svg>
